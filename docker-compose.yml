version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: entitle_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Pull the model on first start
    # Run: docker exec entitle_ollama ollama pull gemma4:e4b

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: entitle_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped
    volumes:
      - ./backend:/app

volumes:
  ollama_data:
